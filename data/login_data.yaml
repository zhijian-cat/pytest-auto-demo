login_cases:
  - name: "正常登录"
    username: "admin"
    password: "123456"
    expected: "成功"
  
  - name: "密码错误"
    username: "admin"
    password: "wrong"
    expected: "失败"
  
  - name: "用户名为空"
    username: ""
    password: "123456"
    expected: "用户名不能为空"

login_cases_10:
  - name: "TC001_正常登录_管理员"
    username: "admin"
    password: "admin123"
    expected_code: 200
    expected_msg: "登录成功"
    priority: "p0"
    markers: ["smoke", "login"]
  
  - name: "TC002_正常登录_普通用户"
    username: "user001"
    password: "pass123"
    expected_code: 200
    expected_msg: "登录成功"
    priority: "p1"
    markers: ["smoke", "login"]
  
  - name: "TC003_密码错误"
    username: "admin"
    password: "wrong"
    expected_code: 401
    expected_msg: "用户名或密码错误"
    priority: "p0"
    markers: ["regression", "login"]
  
  - name: "TC004_用户名为空"
    username: ""
    password: "admin123"
    expected_code: 400
    expected_msg: "用户名不能为空"
    priority: "p0"
    markers: ["regression", "login"]
  
  - name: "TC005_密码为空"
    username: "admin"
    password: ""
    expected_code: 400
    expected_msg: "密码不能为空"
    priority: "p0"
    markers: ["regression", "login"]
  
  - name: "TC006_用户名不存在"
    username: "notexist"
    password: "123456"
    expected_code: 404
    expected_msg: "用户不存在"
    priority: "p1"
    markers: ["regression", "login"]
  
  - name: "TC007_SQL注入测试"
    username: "' OR '1'='1"
    password: "123456"
    expected_code: 401
    expected_msg: "用户名或密码错误"
    priority: "p1"
    markers: ["regression", "login"]
  
  - name: "TC008_XSS攻击测试"
    username: "<script>alert('xss')</script>"
    password: "123456"
    expected_code: 400
    expected_msg: "用户名包含非法字符"
    priority: "p1"
    markers: ["regression", "login"]
  
  - name: "TC009_超长用户名"
    username: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
    password: "123456"
    expected_code: 400
    expected_msg: "用户名长度超出限制"
    priority: "p2"
    markers: ["regression", "login"]
  
  - name: "TC010_特殊字符测试"
    username: "test@#$%"
    password: "123456"
    expected_code: 401
    expected_msg: "用户名或密码错误"
    priority: "p2"
    markers: ["regression", "login"]